services:
  worker:
    build:
      context: ./worker
    env_file:
      - ./worker/.env
    environment:
      - JOBS_JSON_PATH=/app/data/jobs.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src/data/jobs.json:/app/data/jobs.json
      - ./worker/data:/app/data
    restart: unless-stopped
